<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Coach — Gorila Sport</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="Index.html">
          <div class="brand-logo">🦍</div>
          <div class="brand-title"><strong>Gorila Sport</strong><span>Coach Panel</span></div>
        </a>
        <div class="topbar-actions">
          <button class="btn btn-ghost" id="logout-button">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <main class="page dashboard-page">
      <section class="dashboard-panel">
        <div class="dashboard-top">
          <div>
            <h1 id="dashboard-title">Dashboard Coach</h1>
            <p id="dashboard-subtitle">Gestiona atletas, planes de entrenamiento y resultados.</p>
          </div>
          <div class="dashboard-actions">
            <a class="btn btn-primary" href="register.html">Agregar atleta</a>
            <a class="btn btn-ghost" href="login.html">Cambiar usuario</a>
          </div>
        </div>

        <div class="dashboard-grid" id="dashboard-cards"></div>
        <div id="dashboard-extra"></div>
        <div class="dashboard-footer">
          <p>Los atletas bajo tu supervisión aparecen aquí. Todos los cambios se guardan en tiempo real.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="js/dashboard.js"></script>
</body>
</html>
