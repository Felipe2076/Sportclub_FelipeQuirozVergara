<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — Gorila Sport</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html">
          <div class="brand-logo">🦍</div>
          <div class="brand-title"><strong>Gorila Sport</strong><span>Únete a la comunidad</span></div>
        </a>
        <nav class="nav" aria-label="Navegación principal">
          <a href="index.html">Inicio</a>
          <a href="login.html">Login</a>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <div class="auth-brand">
          <a href="index.html" aria-label="Volver al inicio">
            <svg width="100" height="100" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="gorillaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#e55100;stop-opacity:1" />
                </linearGradient>
              </defs>
              <circle cx="100" cy="100" r="95" fill="url(#gorillaGrad)" stroke="#fff" stroke-width="2"/>
              <ellipse cx="100" cy="90" rx="50" ry="55" fill="#2c1810"/>
              <circle cx="75" cy="70" r="18" fill="#fff"/>
              <circle cx="125" cy="70" r="18" fill="#fff"/>
              <circle cx="75" cy="70" r="12" fill="#ff6b35"/>
              <circle cx="125" cy="70" r="12" fill="#ff6b35"/>
              <circle cx="78" cy="68" r="6" fill="#000"/>
              <circle cx="128" cy="68" r="6" fill="#000"/>
              <ellipse cx="100" cy="110" rx="22" ry="28" fill="#8b4513"/>
              <path d="M 90 95 Q 100 105 110 95" stroke="#000" stroke-width="2" fill="none"/>
            </svg>
          </a>
        </div>
        <header class="form-header">
          <span class="form-kicker">Alta de usuario</span>
          <h2>Crear tu perfil</h2>
          <p>Regístrate en Gorila Sport y accede a tu dashboard personalizado según tu rol.</p>
        </header>

        <form id="register-form" action="#" method="post" novalidate>
          <div class="form-group">
            <label for="firstName">Nombre completo</label>
            <input type="text" id="firstName" name="firstName" autocomplete="name" required placeholder="Ej. Felipe Quiroz" />
          </div>

          <div class="form-group">
            <label for="role">Rol</label>
            <select id="role" name="role" required>
              <option value="User">Atleta</option>
              <option value="Coach">Coach</option>
              <option value="Admin">Administrador</option>
            </select>
          </div>

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" autocomplete="email" required placeholder="tu@correo.com" />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="Mínimo 8 caracteres" />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmar contraseña</label>
            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required placeholder="Repite tu contraseña" />
          </div>

          <button type="submit" class="btn btn-primary btn-login">Crear cuenta</button>
        </form>

        <p id="form-message" class="message is-hidden" role="status" aria-live="polite"></p>

        <p class="form-footer">¿Ya tienes cuenta? <a href="login.html">Accede aquí</a></p>
      </div>
    </main>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
