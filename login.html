<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Inicia sesión en Gorila Sport, el sistema web del club deportivo." />
  <title>Login — Gorila Sport</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html">
        <img class="brand-logo-img" src="assets/logo.png" alt="Logo Gorila Sport" width="48" height="48" />
        <div class="brand-title">
          <strong>Gorila Sport</strong>
          <span>Tu plataforma deportiva</span>
        </div>
      </a>
      <nav class="nav" aria-label="Navegación principal">
        <a href="index.html">Inicio</a>
        <a href="register.html">Registro</a>
        <a href="recover.html">Recuperar</a>
      </nav>
    </div>
  </header>

  <main class="auth-page" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 70px); padding: 2rem;">
    <section class="auth-card" aria-labelledby="login-title" style="max-width: 450px; width: 100%;">
      <header class="auth-card-header" style="text-align: center; margin-bottom: 2rem;">
        <img class="auth-logo" src="assets/logo.png" alt="Gorila Sport" width="100" height="100" style="margin-bottom: 1rem;" />
        <h1 id="login-title">Iniciar sesión</h1>
        <p>Accede con tu correo y contraseña para entrar al club.</p>
      </header>

      <form id="login-form" action="#" method="post" novalidate>
        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="tu@correo.com" />
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-login" id="login-submit" style="width: 100%;">Iniciar sesión</button>
      </form>

      <p id="form-message" class="message is-hidden" role="status" aria-live="polite" style="margin-top: 1rem; text-align: center;"></p>

      <nav class="auth-links" aria-label="Enlaces de cuenta" style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 1rem; font-size: 0.9rem;">
        <a href="recover.html">¿Olvidaste tu contraseña?</a>
        <a href="register.html">Registrarse</a>
      </nav>
    </section>
  </main>

  <footer class="site-footer" style="text-align: center; padding: 2rem; color: var(--text-muted);">
    <p>&copy; 2026 Gorila Sport — Club deportivo</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
