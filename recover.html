<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Recupera tu contraseña de Gorila Sport." />
  <title>Recuperar contraseña — Gorila Sport</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">
        <img class="brand-logo-img" src="assets/logo.png" alt="Logo Gorila Sport" width="42" height="42" />
        <div class="brand-title">
          <strong>Gorila Sport</strong>
          <span>Recuperación de acceso</span>
        </div>
      </a>
      <nav class="nav" aria-label="Navegación principal">
        <a href="index.html">Inicio</a>
        <a href="login.html">Login</a>
        <a href="register.html">Registro</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card" aria-labelledby="recover-title">
      <header class="auth-card-header">
        <img class="auth-logo" src="assets/logo.png" alt="Gorila Sport" width="80" height="80" />
        <h1 id="recover-title">Recuperar contraseña</h1>
        <p>Ingresa tu correo y te enviaremos un enlace para restablecer tu acceso.</p>
      </header>

      <form id="recover-form" action="#" method="post" novalidate>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="tu@correo.com" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="recover-submit">Recuperar contraseña</button>
      </form>

      <div id="recover-success" class="recover-success is-hidden" role="status" aria-live="polite">
        <p class="recover-success-title">Solicitud enviada</p>
        <p>Se ha enviado un enlace de recuperación a su correo.</p>
      </div>

      <p class="form-footer"><a href="login.html">Volver al login</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Gorila Sport — Club deportivo</p>
  </footer>

  <script src="js/recover.js"></script>
</body>
</html>
